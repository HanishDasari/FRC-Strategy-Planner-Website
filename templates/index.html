<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container auth-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">FRC Strategy Hub</h1>

        <div class="card">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div
                style="color: var(--red-alliance); margin-bottom: 1rem; text-align: center; padding: 0.5rem; background: rgba(255, 0, 0, 0.1); border-radius: 4px;">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <div style="padding: 1rem;">
                <form action="/auth/login" method="POST" style="margin-bottom: 1.5rem;">
                    <div style="margin-bottom: 1rem;">
                        <input type="email" name="email" placeholder="Email" required
                            style="width: 100%; padding: 0.8rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary);">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <input type="password" name="password" placeholder="Password" required
                            style="width: 100%; padding: 0.8rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary);">
                    </div>
                    <button type="submit" class="btn" style="width: 100%; padding: 0.8rem; font-weight: bold;">
                        Login
                    </button>
                </form>

                <div
                    style="text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-secondary);">
                    Don't have an account? <a href="/register"
                        style="color: var(--blue-alliance); text-decoration: none;">Register</a> |
                    <a href="/forgot-password" style="color: var(--text-secondary); text-decoration: none;">Forgot
                        Password?</a>
                </div>

                <div style="position: relative; text-align: center; margin: 1.5rem 0;">
                    <hr style="border: 0; border-top: 1px solid var(--border-color);">
                    <span
                        style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg-primary); padding: 0 0.5rem; color: var(--text-secondary); font-size: 0.8rem;">
                        OR
                    </span>
                </div>

                <a href="/login/google" class="btn"
                    style="width: 100%; display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 0.8rem; background: #fff; color: #757575; border: 1px solid #ddd; font-weight: 500;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
                        style="width: 18px; margin-right: 12px;">
                    Sign in with Google
                </a>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
