<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Forgot Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-card {
            max-width: 400px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 1rem;">Reset Password</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
                Enter your email and we'll send you a recovery link.
            </p>

            <form action="/auth/forgot-password" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@example.com">
                </div>

                <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-weight: bold;">
                    Send Recovery Link
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Remembered? <a href="/" style="color: var(--blue-alliance); text-decoration: none;">←</a>
            </div>
        </div>
    </div>
</body>

</html>
