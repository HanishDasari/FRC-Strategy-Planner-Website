<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Reset Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container container-auth">
        <div class="auth-container">
            <h1
                style="text-align: center; margin-bottom: 0.75rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Set New Password</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2.5rem; font-size: 1.05rem;">
                Protect your account with a strong, new password.</p>

            <div class="card">
                <form action="/auth/reset-password" method="POST">
                    <input type="hidden" name="token" value="{{ token }}">

                    <div class="form-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">New
                            Password</label>
                        <input type="password" name="password" required placeholder="••••••••" minlength="8">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 1rem;">
                        Update Password
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-secondary);">
                    Nevermind? <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">Back
                        to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
