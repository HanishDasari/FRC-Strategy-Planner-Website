<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FRC Strategy Platform - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container auth-container">
        <div class="auth-logo-container">
            <img src="/static/images/shark_logo.png" alt="6905 Tear-A-Byte Logo" class="auth-logo">
        </div>
        <h1
            style="text-align: center; margin-bottom: 3rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
            FRC Strategy Planner</h1>

        <div class="tabs">
            <div class="tab active">Login</div>
            <a href="/register" class="tab" style="text-decoration: none;">Register</a>
        </div>

        <div class="card">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div
                style="color: var(--danger); margin-bottom: 1.5rem; text-align: center; padding: 0.75rem; background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.2); border-radius: 10px;">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <div id="login-section" style="padding: 0.5rem; position: relative; z-index: 10;">
                <form action="/auth/login" method="POST" id="login-form" novalidate style="margin-bottom: 2rem;">
                    <div style="margin-bottom: 1.25rem;">
                        <input type="email" name="email" placeholder="Email" autocomplete="email" required>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" name="password" placeholder="Password" autocomplete="current-password"
                            required maxlength="128">
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="eye-icon">👁️</i>
                        </button>
                    </div>
                    <button type="submit" class="btn"
                        style="width: 100%; padding: 1rem; margin-top: 0.5rem; cursor: pointer; position: relative; z-index: 100; touch-action: manipulation;">
                        Login
                    </button>
                </form>

                <div style="text-align: center; font-size: 0.95rem; margin-bottom: 2rem; color: var(--text-secondary);">
                    Don't have an account? <a href="/register"
                        style="color: var(--accent); text-decoration: none; font-weight: 600;">Register</a> |
                    <a href="/forgot-password" style="color: var(--text-secondary); text-decoration: none;">Forgot
                        Password?</a>
                </div>

            </div>
        </div>

        <footer class="site-footer">
            <div class="copyright">
                <img src="/static/images/shark_logo.png" alt="Shark Logo" class="copyright-logo">
                <span>&copy; 2026 FRC Team 6905 Tear-A-Byte. All Rights Reserved.</span>
            </div>
        </footer>
    </div>
    <script src="/static/js/main.js"></script>
</body>

</html>
