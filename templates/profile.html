<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Edit Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container">
        <header class="dashboard-header">
            <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none;">&larr; Back to
                Dashboard</a>
            <h2>Edit Profile</h2>
            <div></div>
        </header>

        <div class="auth-container" style="margin-top: 2rem;">
            <div class="card">
                {% with messages = get_flashed_messages() %}
                {% if messages %}
                <div
                    style="color: var(--success); margin-bottom: 1.5rem; text-align: center; padding: 0.75rem; background: rgba(63, 185, 80, 0.1); border: 1px solid rgba(63, 185, 80, 0.2); border-radius: 10px;">
                    {{ messages[0] }}
                </div>
                {% endif %}
                {% endwith %}

                <form action="/auth/profile/update" method="POST">
                    <div class="form-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Full
                            Name</label>
                        <input type="text" name="name" required value="{{ g.user['name'] }}">
                    </div>
                    <div class="form-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Email
                            Address (Cannot be changed)</label>
                        <input type="email" name="email" required value="{{ g.user['email'] }}" readonly
                            style="background: #0d1117; cursor: not-allowed; border-color: var(--border);">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem;">
                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Team
                                #</label>
                            <input type="number" name="team_number" required value="{{ g.user['team_number'] }}">
                        </div>
                        <div class="form-group">
                            <label
                                style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Team
                                Name</label>
                            <input type="text" name="team_name" required value="{{ g.user['team_name'] }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">New
                            Password <span
                                style="font-size: 0.8rem; color: var(--text-secondary); font-weight: normal;">(Leave
                                blank to keep current)</span></label>
                        <div class="password-wrapper">
                            <input type="password" name="password" placeholder="••••••••" minlength="10" maxlength="128"
                                data-strength-meter="true">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="eye-icon">👁️</i>
                            </button>
                        </div>
                        <div class="strength-meter-container" style="display: none;">
                            <div
                                style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.3rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em;">
                                <span>Weak</span>
                                <span>Strong</span>
                            </div>
                            <div class="strength-meter">
                                <div class="strength-bar" id="strength-bar"
                                    style="width: 5%; background-color: var(--danger);"></div>
                            </div>
                            <div style="font-size: 0.85rem; margin-top: 0.5rem;">
                                <div style="font-weight: 500; margin-bottom: 0.3rem; color: var(--danger);"
                                    id="strength-text">Strength: Weak</div>
                                <div
                                    style="display: flex; flex-direction: column; gap: 0.2rem; font-size: 0.8rem; color: var(--text-secondary);">
                                    <div class="req-item req-length">✗ 10+ characters</div>
                                    <div class="req-item req-upper">✗ 1 uppercase letter</div>
                                    <div class="req-item req-number">✗ 1 number</div>
                                    <div class="req-item req-special">✗ 1 special character</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2.5rem;">
                        <button type="submit" class="btn" style="flex: 2; padding: 1rem;">
                            Save Changes
                        </button>
                        <button type="button" onclick="confirmDelete()" class="btn"
                            style="flex: 1; background: var(--red-alliance); border: none; padding: 1rem;">
                            Delete Account
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="copyright">
            <img src="/static/images/shark_logo.png" alt="Shark Logo" class="copyright-logo">
            <span>&copy; 2026 FRC Team 6905 Tear-A-Byte. All Rights Reserved.</span>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    <script>
        function confirmDelete() {
            if (confirm("Are you sure you want to delete your account? This action is permanent and cannot be undone.")) {
                window.location.href = "/auth/delete-account";
            }
        }
    </script>
</body>

</html>
