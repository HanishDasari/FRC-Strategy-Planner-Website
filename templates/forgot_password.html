<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Forgot Password</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container container-auth">
        <div class="auth-container">
            <h1
                style="text-align: center; margin-bottom: 0.75rem; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Reset Password</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2.5rem; font-size: 1.05rem;">
                Enter your email to receive a recovery link.</p>

            <div class="card">
                <form action="/auth/forgot-password" method="POST">
                    <div class="form-group">
                        <label
                            style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Email
                            Address</label>
                        <input type="email" name="email" required placeholder="john@example.com">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; padding: 1rem;">
                        Send Recovery Link
                    </button>
                </form>

                <div style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-secondary);">
                    Remembered? <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">Back
                        to Login</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="copyright">
            <img src="/static/images/shark_logo.png" alt="Shark Logo" class="copyright-logo">
            <span>&copy; 2026 FRC Team 6905 Terabytes. All Rights Reserved.</span>
        </div>
    </footer>
</body>

</html>
