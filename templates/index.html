<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container auth-container">
        <h1 style="text-align: center; margin-bottom: 2rem;">FRC Strategy Hub</h1>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" data-target="login">Login</div>
                <div class="tab" data-target="register">Register</div>
            </div>

            <form id="login-form">
                <label>Username</label>
                <input type="text" name="username" required>
                
                <label>Password</label>
                <input type="password" name="password" required>
                
                <button type="submit" class="btn" style="width: 100%">Login</button>
            </form>

            <form id="register-form" class="hidden">
                <label>Team Number</label>
                <input type="number" name="team_number" required>
                
                <label>Team Name</label>
                <input type="text" name="team_name" placeholder="e.g. The Cheesy Poofs" required>

                <label>Username</label>
                <input type="text" name="username" required>
                
                <label>Password</label>
                <input type="password" name="password" required>
                
                <button type="submit" class="btn" style="width: 100%">Register & Join Team</button>
            </form>
            
            <div id="auth-error" style="color: var(--red-alliance); margin-top: 1rem; display: none;"></div>
        </div>
    </div>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
