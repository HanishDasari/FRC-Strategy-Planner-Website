<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Edit Profile</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-card {
            max-width: 450px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue-alliance);
        }
    </style>
</head>

<body>
    <div class="container">
        <header
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 1rem 0;">
            <a href="/dashboard" style="color: var(--text-secondary); text-decoration: none;">&larr; Back to
                Dashboard</a>
            <h2>Edit Profile</h2>
            <div></div>
        </header>

        <div class="auth-card">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div
                style="color: var(--blue-alliance); margin-bottom: 1rem; text-align: center; padding: 0.5rem; background: rgba(0, 102, 255, 0.1); border-radius: 4px;">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form action="/auth/profile/update" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required value="{{ g.user['name'] }}">
                </div>
                <div class="form-group">
                    <label>Email Address (Cannot be changed)</label>
                    <input type="email" name="email" required value="{{ g.user['email'] }}" readonly
                        style="background: var(--bg-primary); cursor: not-allowed;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Team #</label>
                        <input type="number" name="team_number" required value="{{ g.user['team_number'] }}">
                    </div>
                    <div class="form-group">
                        <label>Team Name</label>
                        <input type="text" name="team_name" required value="{{ g.user['team_name'] }}">
                    </div>
                </div>
                <div class="form-group">
                    <label>New Password (leave blank to keep current)</label>
                    <input type="password" name="password" placeholder="••••••••">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn" style="flex: 2; padding: 1rem; font-weight: bold;">
                        Save Changes
                    </button>
                    <button type="button" onclick="confirmDelete()" class="btn btn-secondary"
                        style="flex: 1; background: var(--red-alliance); border: none; padding: 1rem; font-weight: bold;">
                        Delete Account
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function confirmDelete() {
            if (confirm("Are you sure you want to delete your account? This action is permanent and cannot be undone.")) {
                window.location.href = "/auth/delete-account";
            }
        }
    </script>
</body>

</html>
