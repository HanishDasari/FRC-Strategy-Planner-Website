<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
</head>

<body>
    <!-- Invite Notification Popup -->
    <div id="invite-notification" class="invite-notification">
        <div class="invite-notification-content">
            <div class="invite-notification-text">
                <strong id="notification-title">New Invite!</strong>
                <small id="notification-message">A team has invited you to a match</small>
            </div>
            <div class="invite-notification-actions">
                <button class="btn-accept" id="notification-accept-btn">Accept</button>
                <button class="btn-decline" id="notification-decline-btn">Decline</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header class="dashboard-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <img src="/static/images/shark_logo.png" alt="Logo" class="logo">
                <h2 style="margin: 0;">Dashboard</h2>
            </div>
            <div class="user-controls">
                <span id="user-info"></span>
                <a href="/profile" class="btn btn-secondary">Profile</a>
                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <div class="dashboard-grid">

            <!-- Matches Section -->
            <div>
                <div class="card" style="margin-bottom: 2rem;">
                    <h3>Create Match</h3>
                    <form id="create-match-form" style="display: flex; gap: 1rem; align-items: flex-end;">
                        <div style="flex-grow: 1;">
                            <label>Match Number</label>
                            <input type="number" name="match_number" required style="margin-bottom: 0;">
                        </div>
                        <div style="flex-grow: 1;">
                            <label>Type</label>
                            <select name="match_type" style="margin-bottom: 0;">
                                <option value="Qualification">Qualification</option>
                                <option value="Elimination">Elimination</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Create</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Your Matches</h3>
                    <div id="matches-list">
                        <!-- Populated by JS -->
                        <p style="color: var(--text-secondary);">Loading matches...</p>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div>
                <div class="card">
                    <h3>Pending Invites</h3>
                    <div id="invites-list">
                        <!-- Populated by JS -->
                        <p style="color: var(--text-secondary);">No pending invites.</p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="site-footer">
            <div class="copyright">
                <img src="/static/images/shark_logo.png" alt="Shark Logo" class="copyright-logo">
                <span>&copy; 2026 FRC Team 6905 Tear-A-Byte. All Rights Reserved.</span>
            </div>
        </footer>
    </div>

    <div id="match-data" data-user-id="{{ current_user_id }}" data-team-id="{{ current_team_id }}"
        data-team-number="{{ current_team_number }}">
    </div>

    <script>
        const CURRENT_USER_ID = {{ current_user_id | default (0) }};
        const CURRENT_TEAM_ID = {{ current_team_id | default (0) }};
        const CURRENT_TEAM_NUMBER = {{ current_team_number | default (0) }};
    </script>
    <script src="/static/js/main.js"></script>
    <script>
        // Init dashboard specific logic
        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.pathname === '/dashboard') {
                initDashboard();
            }
        });
    </script>
</body>

</html>
