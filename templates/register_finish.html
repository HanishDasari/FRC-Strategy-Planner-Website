<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Registration - FRC Strategy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .user-preview {
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="auth-container">
            <h1>Almost There!</h1>
            <p>Complete your profile to join.</p>

            <div class="user-preview">
                <p><strong>{{ name }}</strong></p>
                <p style="color: var(--text-secondary)">{{ email }}</p>
            </div>

            <form action="{{ url_for('register_finish') }}" method="POST">
                <div class="form-group">
                    <label for="team_number">Team Number</label>
                    <input type="number" id="team_number" name="team_number" required placeholder="e.g. 254">
                </div>

                <div class="form-group">
                    <label for="team_name">Team Name</label>
                    <input type="text" id="team_name" name="team_name" required placeholder="e.g. The Cheesy Poofs">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%">Create Account</button>
            </form>
        </div>
    </div>
</body>

</html>
