<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Room - FRC Strategy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <style>
        :root {
            --notification-height: 80px;
        }

        .match-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px 300px;
            gap: 1rem;
            height: calc(100vh - 80px);
            /* Adjust for header */
            padding: 1rem;
            box-sizing: border-box;
        }

        .panel {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95), rgba(20, 20, 30, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .panel-header {
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2));
            backdrop-filter: blur(5px);
        }

        .panel-content {
            flex-grow: 1;
            padding: 0.5rem;
            overflow-y: auto;
            position: relative;
        }

        /* Chat */
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
        }

        .message {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem;
            border-radius: 4px;
        }

        .message strong {
            color: var(--accent);
            font-size: 0.8em;
            display: block;
        }

        .message small {
            color: var(--text-secondary);
            font-size: 0.7em;
            float: right;
        }

        /* Canvas */
        #field-canvas {
            background-color: #333;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
        }

        /* Controls */
        .color-picker {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            justify-content: center;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        /* Notification Popup */
        .invite-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.95), rgba(147, 51, 234, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            min-width: 400px;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
        }

        .invite-notification.show {
            top: 20px;
        }

        .invite-notification-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .invite-notification-text {
            flex-grow: 1;
        }

        .invite-notification-text strong {
            font-size: 1.1em;
            display: block;
            margin-bottom: 0.25rem;
        }

        .invite-notification-text small {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .invite-notification-actions {
            display: flex;
            gap: 0.5rem;
        }

        .invite-notification-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .invite-notification-actions .btn-accept {
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        .invite-notification-actions .btn-accept:hover {
            background: rgba(34, 197, 94, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }

        .invite-notification-actions .btn-decline {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }

        .invite-notification-actions .btn-decline:hover {
            background: rgba(239, 68, 68, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        /* Teams Panel */
        .team-item {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7em;
            font-weight: bold;
            margin-left: 0.5rem;
        }

        .team-badge.red {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(220, 38, 38, 0.4));
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .team-badge.blue {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.4), rgba(37, 99, 235, 0.4));
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .invite-item {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85em;
        }

        .invite-actions {
            display: flex;
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .invite-actions button {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .invite-actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Enhanced button styles */
        .btn {
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 4px 12px rgba(100, 100, 100, 0.4);
        }
    </style>
</head>

<body style="overflow: hidden;">
    <!-- Invite Notification Popup -->
    <div id="invite-notification" class="invite-notification">
        <div class="invite-notification-content">
            <div class="invite-notification-text">
                <strong id="notification-title">New Invite!</strong>
                <small id="notification-message">Team 1234 has invited you to this match</small>
            </div>
            <div class="invite-notification-actions">
                <button class="btn-accept" onclick="handleNotificationResponse('accept')">Accept</button>
                <button class="btn-decline" onclick="handleNotificationResponse('decline')">Decline</button>
            </div>
        </div>
    </div>
    <header
        style="height: 50px; display: flex; align-items: center; padding: 0 1rem; border-bottom: 1px solid var(--border); justify-content: space-between;">
        <div>
            <a href="/dashboard" class="btn btn-secondary" style="margin-right: 1rem;">←</a>
            <strong>Match Strategy</strong>
        </div>
        <div class="tabs">
            <div class="tab active" data-phase="Autonomous">Autonomous</div>
            <div class="tab" data-phase="Teleop">Teleop</div>
            <div class="tab" data-phase="Endgame">Endgame</div>
        </div>
        <div id="connection-status" style="font-size: 0.8rem; color: var(--text-secondary);">Connecting...</div>
    </header>

    <div class="match-container">
        <!-- Strategy Text -->
        <div class="panel">
            <div class="panel-header">Strategy Notes</div>
            <textarea id="strategy-text"
                style="height: 100%; border: none; resize: none; background: transparent; padding: 1rem;"
                placeholder="Type strategy here..."></textarea>
            <div style="padding: 0.5rem; border-top: 1px solid var(--border); text-align: right;">
                <button id="save-strategy-btn" class="btn">Save</button>
            </div>
        </div>

        <!-- Field Drawing -->
        <div class="panel">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>Field Map</span>
                <button id="clear-drawing-btn" class="btn btn-secondary"
                    style="padding: 2px 8px; font-size: 0.8rem;">Clear</button>
            </div>
            <div class="panel-content"
                style="display: flex; align-items: center; justify-content: center; background: #222;">
                <canvas id="field-canvas" width="600" height="300"></canvas>
            </div>
            <div class="color-picker">
                <div class="color-btn active" style="background: red;" data-color="red"></div>
                <div class="color-btn" style="background: blue;" data-color="blue"></div>
                <div class="color-btn" style="background: green;" data-color="green"></div>
                <div class="color-btn" style="background: yellow;" data-color="yellow"></div>
                <div class="color-btn" style="background: white;" data-color="white"></div>
            </div>
        </div>

        <!-- Teams Panel -->
        <div class="panel">
            <div class="panel-header">Teams</div>
            <div class="panel-content" style="padding: 0;">
                <div style="padding: 0.5rem; border-bottom: 1px solid var(--border);">
                    <strong style="font-size: 0.85em; color: var(--text-secondary);">Active Teams</strong>
                </div>
                <div id="active-teams-list" style="max-height: 200px; overflow-y: auto;"></div>

                <div style="border-top: 1px solid var(--border); padding: 0.75rem;">
                    <strong style="font-size: 0.85em; display: block; margin-bottom: 0.5rem;">Invite Team</strong>
                    <form id="invite-team-form" style="display: flex; gap: 0.5rem;">
                        <input type="number" name="team_number" placeholder="Team #"
                            style="margin-bottom: 0; flex-grow: 1;" required>
                        <button type="submit" class="btn" style="padding: 0.5rem 0.75rem;">Invite</button>
                    </form>
                </div>

                <div style="border-top: 1px solid var(--border); padding: 0.5rem;">
                    <strong
                        style="font-size: 0.85em; color: var(--text-secondary); display: block; margin-bottom: 0.5rem;">Pending
                        Invites</strong>
                    <div id="match-invites-list"></div>
                </div>
            </div>
        </div>

        <!-- Chat -->
        <div class="panel">
            <div class="panel-header">Chat</div>
            <div id="chat-messages"></div>
            <div style="padding: 0.5rem; border-top: 1px solid var(--border);">
                <form id="chat-form" style="display: flex; gap: 0.5rem;">
                    <input type="text" name="content" placeholder="Message..." style="margin-bottom: 0; flex-grow: 1;"
                        autocomplete="off">
                    <button type="submit" class="btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Match ID passed from Flask -->
    <script>
        const MATCH_ID = {{ match_id }};
        const CURRENT_TEAM_NUMBER = {{ current_team_number }};
        const CURRENT_USER_ID = {{ current_user_id }};
        const CURRENT_TEAM_ID = {{ g.user['team_id'] }};
    </script>
    <script src="/static/js/match.js"></script>
</body>

</html>
