<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Strategy Platform - Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .auth-card {
            max-width: 450px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue-alliance);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="auth-card">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Join the Hub</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">Create your team strategy
                profile</p>

            <form action="/auth/register" method="POST">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Team #</label>
                        <input type="number" name="team_number" required placeholder="254">
                    </div>
                    <div class="form-group">
                        <label>Team Name</label>
                        <input type="text" name="team_name" required placeholder="The Cheesy Poofs">
                    </div>
                </div>

                <button type="submit" class="btn"
                    style="width: 100%; margin-top: 1rem; padding: 1rem; font-weight: bold;">
                    Create Account
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="/" style="color: var(--blue-alliance); text-decoration: none;">Login
                    instead</a>
            </div>
        </div>
    </div>
</body>

</html>
