<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Room - FRC Strategy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <style>
        .match-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
            width: 100%;
        }

        .panel:hover {
            border-color: #444c56;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .panel-content {
            padding: 1rem;
            overflow-y: visible;
            position: relative;
        }

        /* Canvas Panel */
        .canvas-panel {
            background: #0d1117;
            display: flex;
            flex-direction: column;
        }

        #field-canvas {
            background-color: #161b22;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--border);
            max-width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
        }

        @media (min-width: 768px) {
            body {
                overflow-y: hidden !important;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }

            .match-container {
                display: grid !important;
                grid-template-columns: 2.5fr 1fr;
                flex-grow: 1;
                overflow: hidden;
                padding-bottom: 1rem !important;
            }

            .canvas-panel {
                height: 100%;
            }

            .canvas-panel .panel-content {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 0 !important;
                padding: 0 !important;
                /* Perfect fit: No padding around canvas */
                background: #000;
                overflow: hidden;
                /* Hide overflow from large canvases */
            }

            .side-panels-container {
                display: flex !important;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
            }

            .side-panels-container>.panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .side-panels-container>.panel>.panel-content {
                overflow-y: auto;
                flex-grow: 1;
            }

            #strategy-text {
                height: 100%;
                min-height: 0 !important;
            }

            .site-footer {
                display: none;
            }
        }
    </style>
</head>

<body style="overflow-y: auto;">
    <!-- Invite Notification Popup -->
    <div id="invite-notification" class="invite-notification">
        <div class="invite-notification-content">
            <div class="invite-notification-text">
                <strong id="notification-title">New Invite!</strong>
                <small id="notification-message">Team 1234 has invited you to this match</small>
            </div>
            <div class="invite-notification-actions">
                <button class="btn-accept" id="notification-accept-btn">Accept</button>
                <button class="btn-decline" id="notification-decline-btn">Decline</button>
            </div>
        </div>
    </div>

    <header class="dashboard-header"
        style="padding: 1rem 1.5rem; margin-bottom: 0; box-sizing: border-box; position: relative;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="/dashboard" class="btn btn-secondary" style="padding: 0.4rem 0.8rem;">&larr;</a>
            <img src="/static/images/shark_logo.png" alt="Logo" class="logo">
            <h2 style="margin: 0; font-size: 1.1rem; white-space: nowrap;">Match Strategy</h2>
        </div>
        <div class="phase-tabs" style="margin-bottom: 0; max-width: 350px; flex-grow: 1;">
            <div class="phase-tab active" data-phase="Autonomous">Auto</div>
            <div class="phase-tab" data-phase="Teleop">Teleop</div>
        </div>
        <div style="flex-grow: 0; display: flex; justify-content: flex-end;">
            <div id="connection-status" class="connection-status-badge">Connecting...</div>
        </div>
    </header>

    <div class="match-container">
        <!-- Field Drawing (Primary Focus) -->
        <div class="panel canvas-panel">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>Field Map</span>
                <button id="clear-drawing-btn" class="btn btn-secondary"
                    style="padding: 4px 12px; font-size: 0.75rem;">Clear All</button>
            </div>
            <div class="panel-content"
                style="display: flex; align-items: center; justify-content: center; min-height: 400px; padding: 2rem 0;">
                <canvas id="field-canvas" width="600" height="300"></canvas>
            </div>
            <div class="color-picker"
                style="padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border);">
                <!-- Colors -->
                <div class="color-btn active" style="background: var(--red-alliance);" data-color="red" title="Red">
                </div>
                <div class="color-btn" style="background: var(--blue-alliance);" data-color="blue" title="Blue"></div>
                <div class="color-btn" style="background: #3fb950;" data-color="green" title="Green"></div>
                <div class="color-btn" style="background: #d29922;" data-color="yellow" title="Yellow"></div>
                <div class="color-btn" style="background: #ff79c6;" data-color="#ff79c6" title="Pink"></div>
                <div class="color-btn" style="background: #8be9fd;" data-color="#8be9fd" title="Cyan"></div>
                <div class="color-btn" style="background: #f0f6fc;" data-color="white" title="White"></div>

                <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>

                <!-- Eraser -->
                <button id="eraser-btn" class="color-btn"
                    style="background: #30363d; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 0.7rem; font-weight: 700; color: var(--text-secondary);"
                    title="Eraser">
                    ERASE
                </button>

                <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px;"></div>

                <!-- Thickness Control -->
                <div style="display: flex; align-items: center; gap: 12px; margin-left: 4px;">
                    <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600;">SIZE</span>
                    <input type="range" id="thickness-slider" min="1" max="50" value="3"
                        style="width: 120px; margin-bottom: 0; cursor: pointer;">
                    <span id="thickness-val"
                        style="font-size: 0.75rem; color: var(--accent); font-weight: 700; min-width: 30px;">3px</span>
                </div>
            </div>
        </div>

        <!-- Alliance and Strategy Grid (Horizontal split for side-by-side but vertical in flow) -->
        <div class="side-panels-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <!-- Teams Panel -->
            <div class="panel">
                <div class="panel-header">Alliances</div>
                <div class="panel-content" style="padding: 0; display: flex; flex-direction: column;">
                    <div id="active-teams-list" style="min-height: 150px; overflow-y: auto;"></div>

                    <div
                        style="border-top: 1px solid var(--border); padding: 1.25rem; background: rgba(255,255,255,0.01);">
                        <strong
                            style="font-size: 0.8em; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 0.75rem;">Invite
                            Team</strong>
                        <form id="invite-team-form" style="display: flex; gap: 0.5rem;">
                            <input type="number" name="team_number" placeholder="Team #"
                                style="margin-bottom: 0; flex-grow: 1;" required>
                            <button type="submit" class="btn" style="padding: 0.6rem 0.8rem;">+</button>
                        </form>
                    </div>

                    <div
                        style="border-top: 1px solid var(--border); padding: 1.25rem; background: rgba(0,0,0,0.15); display: flex; flex-direction: column;">
                        <strong
                            style="font-size: 0.8em; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 0.75rem;">Invites</strong>
                        <div id="match-invites-list" style="min-height: 50px;"></div>
                    </div>
                </div>
            </div>

            <!-- Strategy Text -->
            <div class="panel">
                <div class="panel-header">Strategy Notes</div>
                <div class="panel-content" style="flex-grow: 1; display: flex; flex-direction: column; padding: 0;">
                    <textarea id="strategy-text"
                        style="flex-grow: 1; border: none; resize: none; background: transparent; padding: 1.25rem; margin-bottom: 0; min-height: 300px;"
                        placeholder="Outline your team's strategy here..."></textarea>
                    <div
                        style="padding: 0.75rem 1rem; border-top: 1px solid var(--border); text-align: right; background: rgba(0,0,0,0.1);">
                        <button id="save-strategy-btn" class="btn" style="padding: 0.5rem 1.25rem;">Save Plan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="copyright">
            <img src="/static/images/shark_logo.png" alt="Shark Logo" class="copyright-logo">
            <span>&copy; 2026 FRC Team 6905 Tear-A-Byte. All Rights Reserved.</span>
        </div>
    </footer>

    <!-- Match ID passed from Flask -->
    <script>
        const MATCH_ID = {{ match_id | default (0) }};
        const CURRENT_TEAM_NUMBER = {{ current_team_number | default (0) }};
        const CURRENT_USER_ID = {{ current_user_id | default (0) }};
        const CURRENT_TEAM_ID = {{ current_team_id | default (0) }};
    </script>
    <script src="/static/js/match.js"></script>
</body>

</html>
